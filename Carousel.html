<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel Assignment</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/carousel.css" />
  </head>
  <body>
    <div class="my-carousel carousel slide" id="mycarousel">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img
            src="https://images.pexels.com/photos/18681383/pexels-photo-18681383.jpeg"
            alt="Slide 1"
            class="d-block w-100 slide-img"
          />
        </div>
        <div class="carousel-item">
          <img
            src="https://images.pexels.com/photos/18681382/pexels-photo-18681382.jpeg"
            alt="Slide 2"
            class="d-block w-100 slide-img"
          />
        </div>
        <div class="carousel-item">
          <img
            src="https://images.pexels.com/photos/18264716/pexels-photo-18264716.jpeg"
            alt="Slide 3"
            class="d-block w-100 slide-img"
          />
        </div>
      </div>
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#mycarousel"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#mycarousel"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
    <div class="content">
      <div class="card" id="spring-tut">
        <a
          class="stylish_link"
          href="https://www.youtube.com/watch?v=_oDpUs65OiA&t=7s"
          >WATCH NOW</a
        >
      </div>
      <div class="card" id="sys-design">
        <a
          class="stylish_link"
          href="https://www.youtube.com/watch?v=TXJP0gzCXFQ"
          >WATCH NOW</a
        >
      </div>
      <div class="card" id="mod-backend">
        <a
          class="stylish_link"
          href="https://www.youtube.com/watch?v=U59FUduO6wY"
          >WATCH NOW</a
        >
      </div>
    </div>
    <div class="copyright-panel">
      <p>copyright&#xA9 - Rufaro Nzenze</p>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
